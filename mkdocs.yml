site_name: "Intentional Journey of the Heart"
site_description: "Notes to My Kids (and Grandkids): On My Personal Exploration of the Laws of God's Love — by John G. Tittle"
site_author: "John G. Tittle"
site_url: "https://Epithetical.github.io/intentional-journey-of-the-heart/"
repo_url: "https://github.com/Epithetical/intentional-journey-of-the-heart"
repo_name: "Epithetical/intentional-journey-of-the-heart"
copyright: "Copyright &copy; John G. Tittle — Licensed under CC BY-NC-SA 4.0"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Source Serif Pro
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - footnotes

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Epithetical/intentional-journey-of-the-heart

nav:
  - Home: index.md
  - Reading Guide: reading-guide.md
  - About:
